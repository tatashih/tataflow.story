<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40歲零醫美 — TATA FLOW</title>
<meta name="description" content="從小痘痘肌到40歲素顏被說皮膚好好，靠居家循環保養一步一步養回來的真實故事。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #fdf6ef;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  max-width: 600px;
  margin: 0 auto;
}
.story-img {
  width: 100%;
  display: block;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .65s ease, transform .65s ease;
  image-rendering: -webkit-optimize-contrast;
}
.story-img.visible { opacity: 1; transform: translateY(0); }

.cta-section {
  background: linear-gradient(160deg, #c45c2a 0%, #b84a1e 45%, #9e3616 100%);
  padding: 40px 24px 52px;
  position: relative;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute;
  top: -80px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,210,160,.2) 0%, transparent 65%);
  pointer-events: none;
}
.cta-section::after {
  content: '';
  position: absolute;
  bottom: -60px; left: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,160,80,.12) 0%, transparent 65%);
  pointer-events: none;
}
.cta-inner { position: relative; z-index: 1; max-width: 380px; margin: 0 auto; }
.cta-card {
  background: rgba(255,255,255,.12);
  border: .5px solid rgba(255,255,255,.22);
  border-radius: 16px;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.pw-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  padding-bottom: 16px; margin-bottom: 16px;
  border-bottom: .5px solid rgba(255,255,255,.15);
}
.pw-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; color: rgba(255,240,210,.55);
  letter-spacing: .06em; white-space: nowrap;
}
.pw-code {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px; font-weight: 700;
  letter-spacing: .22em; color: #fff;
  flex: 1; text-align: center;
}
.pw-copy {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 7px 14px;
  border-radius: 20px;
  border: .5px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.8);
  cursor: pointer; white-space: nowrap;
  transition: all .2s; flex-shrink: 0;
  font-family: 'Noto Sans TC', sans-serif;
}
.pw-copy:hover { background: rgba(255,255,255,.22); color: #fff; }
.pw-copy.ok { background: rgba(60,160,80,.3); color: #b8ffc8; border-color: rgba(100,200,120,.5); }
.copy-icon {
  width: 12px; height: 12px;
  fill: none; stroke: currentColor; stroke-width: 1.8;
  stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
}
.line-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px 20px;
  border-radius: 10px; background: #06C755; color: #fff;
  font-family: 'Noto Serif TC', serif;
  font-size: 16px; font-weight: 700; letter-spacing: .05em;
  border: none; cursor: pointer; text-decoration: none;
  transition: opacity .18s, transform .18s, box-shadow .18s;
  box-shadow: 0 4px 20px rgba(0,0,0,.22);
}
.line-btn:hover { opacity: .92; transform: translateY(-2px); }
.line-btn:active { transform: translateY(0); }
.line-logo { width: 22px; height: 22px; flex-shrink: 0; }
.cta-proof {
  margin-top: 14px; text-align: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 11px; color: rgba(255,235,200,.4); line-height: 1.7;
}
</style>
</head>
<body>

<img class="story-img" src="story-p1.jpg" alt="40歲零醫美，從小痘痘肌靠居家循環保養養出好膚質" loading="eager">
<img class="story-img" src="story-p2.jpg" alt="35歲後衰老問題與現在40歲的改變歷程" loading="lazy">
<img class="story-img" src="story-p3.jpg" alt="讓皮膚改變的3大關鍵：養膚打底、循環疏通、筋膜放鬆" loading="lazy">
<img class="story-img" src="story-p4.jpg" alt="臉部循環保養攻略：我的循環保養SOP" loading="lazy">
<img class="story-img" src="story-p5.jpg" alt="現在的我——如果妳也有這些困擾可以從這裡開始" loading="lazy">

<section class="cta-section">
  <div class="cta-inner">
    <div class="cta-card">
      <div class="pw-row">
        <span class="pw-label">加入密碼</span>
        <span class="pw-code">0620</span>
        <button class="pw-copy" id="pwBtn" onclick="copyPw()" aria-label="複製密碼">
          <svg class="copy-icon" viewBox="0 0 16 16" aria-hidden="true">
            <rect x="5" y="5" width="8" height="8" rx="1.5"/>
            <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H3.5A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
          </svg>
          <span id="pwLabel">複製密碼</span>
        </button>
      </div>
      <a class="line-btn"
        href="https://line.me/ti/g2/aTAZ9Bq2zhFXjR6P2TpvyRcVUh5rf2ofCG2Zhg"
        target="_blank" rel="noopener noreferrer">
        <svg class="line-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M37 20.5c0-7.18-7.16-13-16-13S5 13.32 5 20.5c0 6.43 5.69 11.81 13.37 12.82.52.11 1.23.34 1.41.79.16.4.1 1.03.05 1.44l-.23 1.35c-.07.4-.32 1.58 1.38.86s9.19-5.41 12.54-9.26C35.55 26.06 37 23.42 37 20.5z" fill="white"/>
          <path d="M16.5 23.5h-3a.5.5 0 0 1-.5-.5v-5.5a.5.5 0 0 1 1 0V22.5h2.5a.5.5 0 0 1 0 1zM19 23a.5.5 0 0 1-1 0v-5.5a.5.5 0 0 1 1 0V23zM26 23a.5.5 0 0 1-.38.485L22.5 18.7V23a.5.5 0 0 1-1 0v-5.5a.5.5 0 0 1 .88-.32l3.12 4.79V17.5a.5.5 0 0 1 1 0V23zM31 19a.5.5 0 0 1 0 1h-2v1h2a.5.5 0 0 1 0 1h-2v1h2a.5.5 0 0 1 0 1h-2.5a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5H31z" fill="#06C755"/>
        </svg>
        加入循環學 LINE 社群
      </a>
    </div>
    <p class="cta-proof">已有 500+ 人加入 · 免費 · 複製密碼後點按鈕加入</p>
  </div>
</section>

<script>
function copyPw() {
  navigator.clipboard.writeText('0620').then(function() {
    var btn = document.getElementById('pwBtn');
    var lbl = document.getElementById('pwLabel');
    btn.classList.add('ok'); lbl.textContent = '已複製！';
    setTimeout(function() { btn.classList.remove('ok'); lbl.textContent = '複製密碼'; }, 2400);
  }).catch(function() {
    var el = document.createElement('textarea');
    el.value = '0620'; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    document.getElementById('pwLabel').textContent = '已複製！';
    setTimeout(function() { document.getElementById('pwLabel').textContent = '複製密碼'; }, 2400);
  });
}
var imgs = document.querySelectorAll('.story-img');
var obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
  });
}, { threshold: 0.04 });
imgs.forEach(function(img) { obs.observe(img); });
if (imgs[0]) imgs[0].classList.add('visible');
</script>
</body>
</html>
